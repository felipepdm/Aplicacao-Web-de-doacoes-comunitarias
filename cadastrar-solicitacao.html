<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedir um item - Mutirão Solidário</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="topo">
      <div>
        <h1>Mutirão Solidário</h1>
        <div class="subtitulo">Conjunto Dom Helder Câmara - Candeias, Jaboatão dos Guararapes</div>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="cadastrar-doacao.html">Doar um item</a></li>
          <li><a href="cadastrar-solicitacao.html">Pedir um item</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <form id="form-solicitacao">
      <h2>Registrar pedido</h2>

      <div class="campo">
        <label for="nome">Seu nome</label>
        <input type="text" id="nome" name="nome" required>
      </div>

      <div class="campo">
        <label for="telefone">Telefone ou WhatsApp para contato</label>
        <input type="tel" id="telefone" name="telefone" required placeholder="(81) 9XXXX-XXXX">
      </div>

      <div class="campo">
        <label for="categoria">Categoria do item</label>
        <select id="categoria" name="categoria" required>
          <option value="">Selecione...</option>
          <option value="Roupas">Roupas</option>
          <option value="Alimentos">Alimentos</option>
          <option value="Utensílios domésticos">Utensílios domésticos</option>
          <option value="Material escolar">Material escolar</option>
          <option value="Outros">Outros</option>
        </select>
      </div>

      <div class="campo">
        <label for="item">Item necessário</label>
        <input type="text" id="item" name="item" required placeholder="Ex: Caderno e lápis para criança">
      </div>

      <div class="campo">
        <label for="quantidade">Quantidade</label>
        <input type="number" id="quantidade" name="quantidade" min="1" value="1" required>
      </div>

      <div class="campo">
        <label for="descricao">Detalhes (opcional)</label>
        <textarea id="descricao" name="descricao" placeholder="Para quem é, tamanho, urgência, etc."></textarea>
      </div>

      <button type="submit">Enviar pedido</button>

      <div id="mensagem" class="mensagem"></div>
    </form>
  </main>

  <footer>
    Mutirão Solidário &mdash; um projeto comunitário do Conjunto Dom Helder Câmara, Candeias, Jaboatão dos Guararapes - PE.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("form-solicitacao").addEventListener("submit", function (evento) {
      evento.preventDefault();
      cadastrarSolicitacao({
        nome: document.getElementById("nome").value,
        telefone: document.getElementById("telefone").value,
        categoria: document.getElementById("categoria").value,
        item: document.getElementById("item").value,
        quantidade: document.getElementById("quantidade").value,
        descricao: document.getElementById("descricao").value
      });
    });
  </script>
</body>
</html>
